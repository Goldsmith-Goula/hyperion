
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,"Anthropic Sans",sans-serif);background:transparent;color:var(--color-text-primary);overflow:hidden}
#shell{display:flex;flex-direction:column;height:100vh;min-height:600px}
#topbar{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);z-index:30}
.tab{padding:6px 14px;font-size:12px;cursor:pointer;border-radius:6px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);background:transparent;transition:all .2s}
.tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
#title-lbl{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-left:8px}
#main{flex:1;display:flex;overflow:hidden;position:relative}
#viewport{flex:1;overflow:auto;position:relative;background:var(--color-background-secondary)}
#cvs-wrap{position:relative}
canvas{display:block;cursor:default}
#panel{position:sticky;top:0;width:0;flex-shrink:0;overflow:hidden;transition:width .3s ease;background:var(--color-background-primary);border-left:0.5px solid var(--color-border-tertiary);height:100%;display:flex;flex-direction:column}
#panel.open{width:270px}
#panel-inner{width:270px;display:flex;flex-direction:column;height:100%;overflow-y:auto}
#p-img{width:100%;height:130px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden}
#p-img-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--color-text-tertiary)}
#p-img-placeholder svg{opacity:.35}
#p-img-placeholder span{font-size:11px}
#p-body{padding:12px;flex:1}
#p-close{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--color-text-secondary);z-index:5}
#p-title{font-size:13px;font-weight:600;margin-bottom:3px;color:var(--color-text-primary)}
#p-zone{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;margin-bottom:8px}
#p-desc{font-size:11px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:10px}
#p-code{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:8px;font-family:var(--font-mono,monospace);font-size:10px;line-height:1.6;color:var(--color-text-primary);white-space:pre-wrap;word-break:break-all}
#footer{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);z-index:30}
.step-btn{padding:5px 14px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:6px;cursor:pointer;background:var(--color-background-secondary);color:var(--color-text-primary);transition:background .15s}
.step-btn:hover{background:var(--color-background-tertiary)}
#step-lbl{flex:1;text-align:center;font-size:12px;color:var(--color-text-secondary)}
#dots{display:flex;gap:5px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--color-border-secondary);transition:background .3s;cursor:pointer}
.dot.active{background:var(--color-text-primary)}
</style>

<div id="shell">
  <div id="topbar">
    <div class="tab active" onclick="switchTab(0)">System overview</div>
    <div class="tab" onclick="switchTab(1)">Order journey</div>
    <span id="title-lbl">Hyperion Delivery Platform — Infrastructure</span>
  </div>
  <div id="main">
    <div id="viewport">
      <div id="cvs-wrap"><canvas id="c"></canvas></div>
    </div>
    <div id="panel">
      <div id="panel-inner">
        <div id="p-img">
          <div id="p-close" onclick="closePanel()">×</div>
          <div id="p-img-placeholder">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><rect x="4" y="8" width="32" height="24" rx="3" stroke="currentColor" stroke-width="1.5"/><circle cx="20" cy="20" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M4 30l8-6 6 4 6-8 8 10" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
            <span id="p-img-hint">Device image placeholder</span>
          </div>
        </div>
        <div id="p-body">
          <div id="p-title"></div>
          <span id="p-zone"></span>
          <div id="p-desc"></div>
          <div id="p-code"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="footer">
    <button class="step-btn" onclick="prevStep()">← Prev</button>
    <span id="step-lbl">Click any component to inspect it</span>
    <div id="dots"></div>
    <button class="step-btn" onclick="nextStep()">Next →</button>
  </div>
</div>

const journey=[
  {label:'Step 1 — Customer opens app and places order',              hi:['customer'],                 flow:[]},
  {label:'Step 2 — Request travels over internet via HTTPS + JWT',    hi:['customer','internet'],      flow:[{a:'customer',b:'internet'}]},
  {label:'Step 3 — WAF inspects request, firewall validates zone',     hi:['internet','waf','fw1'],     flow:[{a:'internet',b:'waf'},{a:'waf',b:'fw1'}]},
  {label:'Step 4 — Load balancer forwards to API Gateway',            hi:['fw1','lb','api'],           flow:[{a:'fw1',b:'lb'},{a:'lb',b:'api'}]},
  {label:'Step 5 — API Gateway validates JWT token and rate-limits',   hi:['api'],                     flow:[]},
  {label:'Step 6 — App Server creates order, triggers Match Engine',   hi:['api','app','match'],        flow:[{a:'api',b:'app'},{a:'app',b:'match'}]},
  {label:'Step 7 — Match Engine scores drivers and writes to DB',      hi:['match','db'],              flow:[{a:'match',b:'db'}]},
  {label:'Step 8 — WebSocket pushes assignment to driver app',         hi:['ws','driver'],             flow:[{a:'ws',b:'driver'}]},
  {label:'Step 9 — Driver accepts — GPS streams live to customer',     hi:['driver','ws','customer'],  flow:[{a:'driver',b:'ws'},{a:'ws',b:'customer'}]},
  {label:'Step 10 — Delivery done — Payment Module records transaction',hi:['pay','db','bck'],         flow:[{a:'pay',b:'db'},{a:'db',b:'bck'}]},
];

let tab=0, step=0, hov=null, sel=null, pts=[];

function nid(id){return nodes.find(n=>n.id===id);}
function cx(n){return n.x+n.w/2;}
function cy(n){return n.y+n.h/2;}
function ha(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function visNodes(){
  return tab===0?nodes.filter(n=>n.tab===0||n.tab===2):nodes.filter(n=>n.tab===1||n.tab===2);
}
function visEdges(){
  const ids=new Set(visNodes().map(n=>n.id));
  return edges.filter(e=>(e.tab===tab||e.tab===2)&&ids.has(e.a)&&ids.has(e.b));
}
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function tickPts(){
  if(Math.random()<0.14){
    const ee=visEdges();
    if(ee.length){
      const e=ee[Math.floor(Math.random()*ee.length)];
      const a=nid(e.a),b=nid(e.b);
      if(a&&b){
        const hi=tab===1&&journey[step].flow.some(f=>f.a===e.a&&f.b===e.b);
        pts.push({ax:cx(a),ay:cy(a),bx:cx(b),by:cy(b),t:0,spd:0.01+Math.random()*0.01,hi,dash:e.dash});
      }
    }
  }
  pts=pts.filter(p=>p.t<1);
  pts.forEach(p=>{p.t=Math.min(1,p.t+p.spd);});
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);

  const vn=visNodes();
  const vnIds=new Set(vn.map(n=>n.id));
  const ve=visEdges();

  // zones
  zones.filter(z=>z.tab===0||z.tab===tab||z.tab===2).forEach(z=>{
    ctx.save();
    ctx.fillStyle=z.f; ctx.strokeStyle=z.s;
    ctx.lineWidth=1.5; ctx.setLineDash([6,4]);
    rr(z.x,z.y,z.w,z.h,14); ctx.fill(); ctx.stroke();
    ctx.restore();
    ctx.font='bold 11px sans-serif';
    ctx.fillStyle=z.s;
    ctx.fillText(z.label.toUpperCase(), z.x+14, z.y+16);
  });

  // edges
  ve.forEach(e=>{
    const a=nid(e.a),b=nid(e.b); if(!a||!b) return;
    const hiSet=tab===1?journey[step].hi:[];
    const hi=hiSet.includes(e.a)&&hiSet.includes(e.b);
    ctx.save();
    ctx.strokeStyle=hi?'#39d88a':'rgba(180,190,210,0.35)';
    ctx.lineWidth=hi?2.5:1.2;
    if(e.dash) ctx.setLineDash([7,5]);
    ctx.beginPath();
    const ax=cx(a),ay=cy(a),bx=cx(b),by=cy(b);
    if(Math.abs(ax-bx)<20){
      ctx.moveTo(ax,ay); ctx.lineTo(bx,by);
    } else {
      const my=(ay+by)/2;
      ctx.moveTo(ax,ay); ctx.lineTo(ax,my); ctx.lineTo(bx,my); ctx.lineTo(bx,by);
    }
    ctx.stroke();
    // arrowhead
    const dx=bx-ax,dy=by-ay,len=Math.sqrt(dx*dx+dy*dy);
    if(len>0){
      const ux=dx/len,uy=dy/len;
      const tx2=bx-ux*12,ty2=by-uy*12;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(bx,by);
      ctx.lineTo(tx2-uy*6,ty2+ux*6);
      ctx.lineTo(tx2+uy*6,ty2-ux*6);
      ctx.closePath();
      ctx.fillStyle=hi?'#39d88a':'rgba(180,190,210,0.5)';
      ctx.fill();
    }
    ctx.restore();
  });

  // particles
  tickPts();
  pts.forEach(p=>{
    const x=p.ax+(p.bx-p.ax)*p.t;
    const y=p.ay+(p.by-p.ay)*p.t-Math.sin(p.t*Math.PI)*18;
    ctx.beginPath();
    ctx.arc(x,y,p.hi?4.5:3,0,Math.PI*2);
    ctx.fillStyle=p.hi?'#39d88a':'rgba(100,180,255,0.7)';
    ctx.fill();
    // glow
    if(p.hi){
      ctx.beginPath();
      ctx.arc(x,y,8,0,Math.PI*2);
      ctx.fillStyle='rgba(57,216,138,0.15)';
      ctx.fill();
    }
  });

  // nodes
  vn.forEach(n=>{
    const hi=tab===1&&journey[step].hi.includes(n.id);
    const hovered=hov===n.id, clicked=sel===n.id;
    ctx.save();
    if(hi||clicked){
      ctx.shadowColor='rgba(57,216,138,0.8)';
      ctx.shadowBlur=20;
    } else if(hovered){
      ctx.shadowColor=n.c+'aa';
      ctx.shadowBlur=12;
    }
    // node background — solid fill for readability
    ctx.fillStyle=ha(n.c, hi?0.45:hovered?0.38:0.28);
    ctx.strokeStyle=hi?'#39d88a':(hovered||clicked?n.c:ha(n.c,0.85));
    ctx.lineWidth=hi||clicked?2.5:1.2;
    rr(n.x,n.y,n.w,n.h,8); ctx.fill(); ctx.stroke();
    ctx.restore();

    // left color bar
    ctx.save();
    ctx.fillStyle=n.c;
    ctx.beginPath();
    ctx.moveTo(n.x+8,n.y);ctx.lineTo(n.x,n.y);
    ctx.arcTo(n.x,n.y,n.x,n.y+8,8);
    ctx.lineTo(n.x,n.y+n.h-8);
    ctx.arcTo(n.x,n.y+n.h,n.x+8,n.y+n.h,8);
    ctx.lineTo(n.x+8,n.y+n.h);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // icon
    ctx.font='14px serif';
    ctx.fillText(n.icon, n.x+14, n.y+n.h/2+5);

    // label — bright white always
    ctx.font='bold 12px sans-serif';
    ctx.fillStyle='#ffffff';
    ctx.fillText(trimTxt(n.label,n.w-36), n.x+32, n.y+(n.sub?n.h/2-4:n.h/2+4));

    // sub label — light gray
    if(n.sub){
      ctx.font='10px sans-serif';
      ctx.fillStyle='rgba(210,220,235,0.85)';
      ctx.fillText(trimTxt(n.sub,n.w-36), n.x+32, n.y+n.h/2+11);
    }
  });

  requestAnimationFrame(draw);
}

function trimTxt(s,mw){
  if(s.length*6.5<=mw) return s;
  return s.slice(0,Math.floor(mw/6.5)-2)+'…';
}

// interaction
canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  const sx=W/r.width,sy=H/r.height;
  const mx=(e.clientX-r.left)*sx,my=(e.clientY-r.top)*sy;
  const hit=visNodes().find(n=>mx>=n.x&&mx<=n.x+n.w&&my>=n.y&&my<=n.y+n.h);
  hov=hit?hit.id:null;
  canvas.style.cursor=hit?'pointer':'default';
});
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const sx=W/r.width,sy=H/r.height;
  const mx=(e.clientX-r.left)*sx,my=(e.clientY-r.top)*sy;
  const hit=visNodes().find(n=>mx>=n.x&&mx<=n.x+n.w&&my>=n.y&&my<=n.y+n.h);
  if(hit){sel=hit.id;openPanel(hit);}
  else{sel=null;closePanel();}
});

function openPanel(node){
  const d=info[node.id]; if(!d) return;
  document.getElementById('p-title').textContent=node.label;
  const zt=document.getElementById('p-zone');
  zt.textContent=d.zone;
  zt.style.background=ha(node.c,0.25);
  zt.style.color='#ffffff';
  zt.style.border='0.5px solid '+ha(node.c,0.6);
  document.getElementById('p-desc').textContent=d.desc;
  document.getElementById('p-code').textContent=d.code;
  document.getElementById('p-img-hint').textContent=node.label+' — device image';
  document.getElementById('panel').classList.add('open');
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  sel=null;
}

function switchTab(t){
  tab=t; step=0;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===t));
  updateFooter(); closePanel();
}
function scrollToNode(nodeId){
  const n=nid(nodeId); if(!n) return;
  const vp=document.getElementById('viewport');
  const vpW=vp.clientWidth, vpH=vp.clientHeight;
  const scaleX=canvas.getBoundingClientRect().width/W;
  const scaleY=canvas.getBoundingClientRect().height/H;
  const nx=(n.x+n.w/2)*scaleX, ny=(n.y+n.h/2)*scaleY;
  vp.scrollTo({left:nx-vpW/2, top:ny-vpH/2, behavior:'smooth'});
}
function nextStep(){
  if(tab!==1) return;
  step=(step+1)%journey.length;
  updateFooter();
  if(journey[step].hi.length) scrollToNode(journey[step].hi[0]);
}
function prevStep(){
  if(tab!==1) return;
  step=(step-1+journey.length)%journey.length;
  updateFooter();
  if(journey[step].hi.length) scrollToNode(journey[step].hi[0]);
}
function gotoStep(i){
  step=i; updateFooter();
  if(journey[step].hi.length) scrollToNode(journey[step].hi[0]);
}
window.gotoStep=gotoStep;
function buildDots(){
  const dc=document.getElementById('dots');
  if(tab!==1){dc.innerHTML='';return;}
  dc.innerHTML=journey.map((_,i)=>`<div class="dot${i===step?' active':''}" onclick="gotoStep(${i})"></div>`).join('');
}
function updateFooter(){
  document.getElementById('step-lbl').textContent=
    tab===0?'Click any component to inspect it':journey[step].label;
  buildDots();
}
window.switchTab=switchTab;
window.nextStep=nextStep;
window.prevStep=prevStep;
window.closePanel=closePanel;
updateFooter();
draw();
</script>
